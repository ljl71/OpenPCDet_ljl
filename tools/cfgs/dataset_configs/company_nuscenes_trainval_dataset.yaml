DATASET: 'CompanyNuScenesDataset'
DATA_PATH: '../data/nuscenes'

# Company formal data mounted in the container:
# data/nuscenes/v1.0-trainval/*.json and data/nuscenes/samples/LIDAR_TOP/*.bin
# The converted bin is four float32 values per point. In the inspected pair,
# its fourth column is a converter placeholder rather than source PCD intensity.
VERSION: 'v1.0-trainval'
MAX_SWEEPS: 1
LIDAR_POINT_DIM: 4
LIDAR_POINT_FORMAT: float32
LIDAR_POINT_FIELDS: ['x', 'y', 'z', 'intensity']
PRED_VELOCITY: False
FILTER_MIN_POINTS_IN_GT: 1
TRAIN_SPLIT_RATIO: 0.8
SPLIT_SEED: 0
# Custom 26-class center-distance evaluation. This does not produce official nuScenes NDS.
EVAL_DISTANCE_THRESHOLDS: [0.5, 1.0, 2.0, 4.0]
EVAL_TP_DISTANCE_THRESHOLD: 2.0

DATA_SPLIT: {
    'train': train,
    'test': val
}

INFO_PATH: {
    'train': [company_nuscenes_infos_train.pkl],
    'test': [company_nuscenes_infos_val.pkl],
}

POINT_CLOUD_RANGE: [-51.2, -51.2, -5.0, 51.2, 51.2, 3.0]

DATA_AUGMENTOR:
    DISABLE_AUG_LIST: ['gt_sampling']
    AUG_CONFIG_LIST:
        - NAME: random_world_flip
          ALONG_AXIS_LIST: ['x', 'y']

        - NAME: random_world_rotation
          WORLD_ROT_ANGLE: [-0.3925, 0.3925]

        - NAME: random_world_scaling
          WORLD_SCALE_RANGE: [0.95, 1.05]

POINT_FEATURE_ENCODING: {
    encoding_type: absolute_coordinates_encoding,
    used_feature_list: ['x', 'y', 'z', 'intensity'],
    src_feature_list: ['x', 'y', 'z', 'intensity'],
}

DATA_PROCESSOR:
    - NAME: mask_points_and_boxes_outside_range
      REMOVE_OUTSIDE_BOXES: True

    - NAME: shuffle_points
      SHUFFLE_ENABLED: {
        'train': True,
        'test': True
      }

    - NAME: transform_points_to_voxels
      VOXEL_SIZE: [0.1, 0.1, 0.2]
      MAX_POINTS_PER_VOXEL: 10
      MAX_NUMBER_OF_VOXELS: {
        'train': 60000,
        'test': 60000
      }
